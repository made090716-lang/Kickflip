<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KICKFLIP</title>
  <link rel="shortcut icon" href="img/pavcon-01.png" type="image/x-icon">

      <div class="sticker sticker-direction" data-video-id="MyDirection영상ID">
        <img src="img/MY-01.png" alt="My direction">
      </div>

      <div class="sticker sticker-carrier" data-video-id="캐리어영상ID">
        <a href="https://myfirstkick.keyescape.com/">
          <img src="img/1.png" alt="캐리어">
        </a>

      <div class="sticker sticker-escape" data-video-id="방탈출영상ID">

          <img src="img/2.png" alt="킥플립 방탈출">

    <footer>

        <a href="https://www.kick-flip.com/ko/diary?ver=1" class="footer-link">

        <a href="#"><img src="img/in-01.png" alt="Instagram"></a>

        <a href="#"><img src="img/x-01.png" alt="X"></a>
        <a href="#"><img src="img/fans-01.png" alt="FANS"></a>
        <a href="#"><img src="img/s-01.png" alt="SHOP"></a>
      </div>
    </footer>

  </div>

  <div id="videoModal" class="modal">
    <div class="modal-content">
      <button class="close-btn">&times;</button>
      <div class="video-wrapper">
        <iframe id="youtubePlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>
